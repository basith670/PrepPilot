{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-6">

        <div class="card shadow border-0">

            <div class="card-header bg-warning text-dark">

                <h3 class="mb-0">

                    <i class="bi bi-key-fill"></i>

                    Change Password

                </h3>

            </div>

            <div class="card-body">

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">

                            Current Password

                        </label>

                        {{ form.old_password }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            New Password

                        </label>

                        {{ form.new_password1 }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Confirm New Password

                        </label>

                        {{ form.new_password2 }}

                    </div>

                    <button class="btn btn-warning">

                        <i class="bi bi-check-circle"></i>

                        Update Password

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
