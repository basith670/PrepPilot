{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow-sm border-0">

            <div class="card-header bg-primary text-white">

                <h3 class="mb-0">

                    <i class="bi bi-building-add"></i>

                    Add Company

                </h3>

            </div>

            <div class="card-body p-4">

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">

                            Company Name

                        </label>

                        {{ form.company_name }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Job Role

                        </label>

                        {{ form.role }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Location

                        </label>

                        {{ form.location }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Package (LPA)

                        </label>

                        {{ form.package }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Application Date

                        </label>

                        {{ form.application_date }}

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            Status

                        </label>

                        {{ form.status }}

                    </div>

                    <div class="d-flex justify-content-between">

                        <a
                            href="{% url 'placement' %}"
                            class="btn btn-secondary">

                            <i class="bi bi-arrow-left"></i>

                            Back

                        </a>

                        <button
                            type="submit"
                            class="btn btn-primary">

                            <i class="bi bi-check-circle"></i>

                            Save Company

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
