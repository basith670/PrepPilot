{% extends 'base.html' %}

{% block content %}

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow border-0">

<div class="card-header bg-primary text-white">

<h3 class="mb-0">

<i class="bi bi-calendar-plus"></i>

Add New Event

</h3>

</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="form-label fw-semibold">

Title

</label>

{{ form.title }}

</div>

<div class="mb-3">

<label class="form-label fw-semibold">

Description

</label>

{{ form.description }}

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label fw-semibold">

Event Type

</label>

{{ form.event_type }}

</div>

<div class="col-md-6 mb-3">

<label class="form-label fw-semibold">

Date

</label>

{{ form.event_date }}

</div>

</div>

<div class="mb-4">

<label class="form-label fw-semibold">

Time

</label>

{{ form.event_time }}

</div>

<div class="d-flex justify-content-between">

<a href="{% url 'calendar' %}"

class="btn btn-secondary">

Back

</a>

<button
type="submit"
class="btn btn-primary">

<i class="bi bi-check-circle"></i>

Save Event

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
