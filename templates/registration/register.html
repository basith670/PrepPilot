{% extends 'auth_base.html' %}

{% block content %}

<div class="auth-card">

    <div class="text-center mb-4">

        <h1 class="fw-bold text-primary">

            Create Account 🚀

        </h1>

        <p class="text-muted">

            Join PrepPilot and start your placement journey.

        </p>

    </div>

    <form method="POST">

        {% csrf_token %}
    
        <div class="mb-3">
    
            <label class="form-label fw-semibold">
    
                Username
    
            </label>
    
            {{ form.username }}
    
        </div>
    
        <div class="mb-3">
    
            <label class="form-label fw-semibold">
    
                Email
    
            </label>
    
            {{ form.email }}
    
        </div>
    
        <div class="mb-3">
    
            <label class="form-label fw-semibold">
    
                Password
    
            </label>
    
            {{ form.password1 }}
    
        </div>
    
        <div class="mb-3">
    
            <label class="form-label fw-semibold">
    
                Confirm Password
    
            </label>
    
            {{ form.password2 }}
    
        </div>
    
        <button
            type="submit"
            class="btn btn-primary w-100">
    
            <i class="bi bi-person-plus-fill"></i>
    
            Create Account
    
        </button>
    
    </form>

    <hr class="my-4">

    <p class="text-center mb-0">

        Already have an account?

        <a href="{% url 'login' %}">

            Login

        </a>

    </p>

</div>

{% endblock %}
