{% extends 'base.html' %}

{% load crispy_forms_tags %}

{% block content %}

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow border-0 rounded-4">

                <div class="card-header bg-warning">

                    <h3>

                        <i class="bi bi-pencil-square"></i>

                        Edit Topic

                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        {% csrf_token %}

                        {{ form|crispy }}

                        <button
                            class="btn btn-warning">

                            Update Topic

                        </button>

                        <a
                            href="{% url 'topics' %}"
                            class="btn btn-secondary">

                            Cancel

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
