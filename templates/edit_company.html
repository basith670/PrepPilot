{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow border-0">

            <div class="card-header bg-warning text-dark">

                <h3 class="mb-0">

                    <i class="bi bi-pencil-square"></i>

                    Edit Company

                </h3>

            </div>

            <div class="card-body">

                <form method="POST">

                    {% csrf_token %}

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Company Name

                            </label>

                            {{ form.company_name }}

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Role

                            </label>

                            {{ form.role }}

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Location

                            </label>

                            {{ form.location }}

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Package (LPA)

                            </label>

                            {{ form.package }}

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Application Date

                            </label>

                            {{ form.application_date }}

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Status

                            </label>

                            {{ form.status }}

                        </div>

                    </div>

                    <div class="d-flex justify-content-between mt-4">

                        <a href="{% url 'placement' %}"
                           class="btn btn-secondary">

                            <i class="bi bi-arrow-left"></i>

                            Back

                        </a>

                        <button
                            type="submit"
                            class="btn btn-warning">

                            <i class="bi bi-check-circle"></i>

                            Update Company

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
